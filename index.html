<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Audio label</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="/src/index.css" />
  </head>
  <body>
    <div class="mesh-container">
      <div class="mesh-ball b1"></div>
      <div class="mesh-ball b2"></div>
      <div class="mesh-ball b3"></div>
    </div>

    <!-- Login overlay -->
    <div id="login-overlay">
      <div class="login-frame">
        <div class="hero-section">
          <h1>AUDIO<br>LABEL</h1>
        </div>
        <div id="login-card">
          <form id="login-form" autocomplete="on" novalidate>
            <div class="input-group">
              <label for="login-email">Email</label>
              <input id="login-email" type="email" name="email" autocomplete="email" required placeholder="email@example.com" />
            </div>
            <div class="input-group">
              <label for="login-password">Password</label>
              <input id="login-password" type="password" name="password" autocomplete="current-password" required placeholder="••••••••" />
            </div>
            <button id="btn-signin" type="submit">Sign In</button>
            <div id="login-error"></div>
          </form>
        </div>
      </div>
    </div>

    <!-- App shell (hidden until authenticated) -->
    <div id="app-shell">
      <div id="chrome">
        <button type="button" id="btn-prev" aria-label="Previous task">Prev</button>
        <button type="button" id="btn-next" aria-label="Next task">Next</button>
        <button type="button" id="btn-skip" aria-label="Skip task">Skip</button>
        <div id="task-meta"></div>
        <div id="status"></div>
        <button type="button" id="btn-signout">Sign out</button>
      </div>
      <div id="progress-bar-wrap">
        <div id="progress-track"><div id="progress-fill"></div></div>
        <div id="progress-text">0 / 0 annotated</div>
      </div>
      <div id="root"></div>
    </div>

    <div id="save-banner"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
